# 价值观库配置文件
# 7 大分类，每类 3-5 条价值观原则

excellence:
  - name: "坚持最高标准"
    origin: "Amazon LP #7"
    rule: "领导者有着近乎严苛的高标准，即使很多人认为这些标准高得不合理。领导者不断提高标准，激励自己的团队提供优质的产品、服务和流程。"
    violation: "交付物存在明显可改进之处却选择'差不多就行了'直接提交。"

  - name: "追求极致"
    origin: "Apple - Steve Jobs"
    rule: "对产品品质的追求应当深入到用户看不到的地方。即使是机箱内部的电路板排列，也要做到美观整齐。"
    violation: "只关注用户可见部分的质量，对内部实现草草了事。"

  - name: "第一性原理思考"
    origin: "Tesla/SpaceX - Elon Musk"
    rule: "从最基本的事实出发推理，而非类比。质疑每一个假设，找到问题的本质解决方案。"
    violation: "因为'行业惯例都是这么做的'就不假思索地沿用旧方案。"

  - name: "日拱一卒"
    origin: "Toyota - 改善（Kaizen）"
    rule: "每天都要比昨天进步一点。持续的微小改善积累起来将产生巨大的变革。不放过任何可以优化的细节。"
    violation: "满足于当前状态，不主动寻找改进空间。"

  - name: "从优秀到卓越"
    origin: "《从优秀到卓越》- Jim Collins"
    rule: "优秀是卓越的敌人。不要因为取得了不错的成绩就停止追求更高的目标。保持刺猬思维，专注于你能做到世界最好的事。"
    violation: "取得阶段性成果后放松标准，从'做到最好'退化为'做到还行'。"

transparency:
  - name: "坦诚沟通"
    origin: "Netflix Culture"
    rule: "对同事坦诚相待，及时反馈。不在背后议论，当面说出你的想法。即使信息令人不安，也要及时分享。"
    violation: "发现问题但选择沉默，私下抱怨而不当面沟通。"

  - name: "极度透明"
    origin: "Bridgewater - Ray Dalio"
    rule: "几乎所有的会议都应该被记录并分享。让每个人都能看到真实的决策过程。隐瞒信息是对组织信任的最大伤害。"
    violation: "选择性分享信息，对不利消息进行过滤或美化后再传达。"

  - name: "实事求是"
    origin: "华为 - 任正非"
    rule: "报喜也报忧，让决策者看到完整的事实。数据说话，不夸大成绩，不隐瞒问题。自我批判是进步的前提。"
    violation: "汇报时只展示好的数据，回避或淡化存在的风险和问题。"

  - name: "信息对称"
    origin: "Google - 开放文化"
    rule: "默认分享而非默认保密。确保相关方能获得做出正确决策所需的全部信息。消除信息差是提升组织效率的关键。"
    violation: "把信息当作权力来源，通过信息不对称来维护个人地位。"

ownership:
  - name: "主人翁精神"
    origin: "Amazon LP #2"
    rule: "领导者是主人翁。他们会从长远考虑，不会为了短期业绩而牺牲长期价值。他们代表整个公司行事，而不仅仅代表自己的团队。"
    violation: "遇到跨团队问题时说'这不是我的职责范围'而推诿。"

  - name: "以终为始"
    origin: "字节跳动 - 字节范"
    rule: "始终以最终要达成的结果为导向。不被过程中的困难吓退，不因为'太难了'而降低目标。想清楚最终要什么，然后倒推行动。"
    violation: "在执行过程中因为遇到困难就主动降低交付标准或调整目标。"

  - name: "闭环思维"
    origin: "华为 - 项目管理"
    rule: "事事有着落，件件有回音。承诺的事情必须有明确的结果反馈，无论成功还是失败都要给出交代。"
    violation: "任务接下后没有后续跟进，让相关方不得不主动来追问进展。"

  - name: "超越职责边界"
    origin: "Netflix Culture"
    rule: "不要被岗位描述限制。当你看到问题时，即使不在你的职责范围内，也要主动推动解决。公司的问题就是你的问题。"
    violation: "严格按照岗位说明书工作，对职责外的明显问题视而不见。"

decision_making:
  - name: "速度优先"
    origin: "Amazon LP #8 - Bias for Action"
    rule: "商业中速度至关重要。很多决策是可逆的，不需要过度研究。提倡经过计算的冒险。"
    violation: "面对可逆决策时反复讨论、等待更多数据，错过最佳行动时机。"

  - name: "可信度加权决策"
    origin: "Bridgewater - Ray Dalio"
    rule: "不是每个人的意见都同等重要。在特定领域有更多经验和更好历史记录的人，其观点应获得更大权重。"
    violation: "完全按照职位高低而非专业能力来决定谁的意见更重要。"

  - name: "数据驱动"
    origin: "Google - 数据文化"
    rule: "用数据说话，而非凭直觉或经验。每个重要决策都应该有数据支撑。没有数据时，先设计实验获取数据。"
    violation: "仅凭个人经验或直觉做出重大决策，不寻求数据验证。"

  - name: "逆向工作法"
    origin: "Amazon - Working Backwards"
    rule: "从客户需求出发，逆向推导解决方案。先写新闻稿和FAQ，再决定是否值得做以及如何做。"
    violation: "从现有技术能力出发思考能做什么，而非从客户真正需要什么出发。"

learning:
  - name: "保持好奇心"
    origin: "Amazon LP #5 - Learn and Be Curious"
    rule: "领导者从不停止学习，永远探索新的可能性。对新领域保持好奇并付诸行动。"
    violation: "对新技术、新方法持抵触态度，坚持用熟悉的旧方式解决所有问题。"

  - name: "拥抱失败"
    origin: "Microsoft - Growth Mindset"
    rule: "失败是学习的最佳途径。关键不是避免失败，而是从每次失败中提取最大的学习价值。快速失败，快速学习。"
    violation: "害怕失败而不敢尝试新方法，或者失败后不做复盘就匆忙进入下一个任务。"

  - name: "刻意练习"
    origin: "《刻意练习》- Anders Ericsson"
    rule: "进步来自有目的的练习，而非简单重复。找到能力边界，在舒适区之外进行针对性训练。"
    violation: "重复做自己已经擅长的事情，回避需要学习新技能的挑战。"

  - name: "知识传承"
    origin: "Toyota - 师徒制"
    rule: "学到的东西必须教给别人。知识不分享就会消亡。通过教授他人来深化自己的理解。"
    violation: "把知识藏着掖着作为个人竞争优势，不愿意帮助他人成长。"

collaboration:
  - name: "利他主义"
    origin: "字节跳动 - 字节范"
    rule: "优先考虑全局最优而非局部最优。在合作中主动补位，帮助他人成功就是帮助自己成功。"
    violation: "只关注自己负责模块的完成度，对团队整体目标漠不关心。"

  - name: "建设性反对"
    origin: "Amazon LP #13 - Have Backbone; Disagree and Commit"
    rule: "如果你不同意某个决定，要尊重地提出挑战。一旦做出决定，就全力以赴执行，即使你之前不同意。"
    violation: "表面上同意决策但在执行时消极怠工，或者在决策后仍然私下抱怨。"

  - name: "上下文而非控制"
    origin: "Netflix Culture"
    rule: "通过提供充分的上下文来让队友做出好决策，而非通过审批流程来控制行为。信任比控制更能激发创造力。"
    violation: "对团队成员的工作事无巨细地指挥和审核，不给予自主决策空间。"

  - name: "10x 乘数效应"
    origin: "Google - 工程文化"
    rule: "优秀的协作者让周围每个人都变得更好。追求不仅自己产出10倍，更要让团队整体产出10倍。"
    violation: "个人能力很强但团队协作时拖慢整体节奏，或不愿意花时间帮助他人提升。"

long_termism:
  - name: "长期思考"
    origin: "Amazon LP #2"
    rule: "不会为了短期业绩而牺牲长期价值。愿意为了长远正确的事情承受短期的不理解和压力。"
    violation: "为了完成季度KPI而选择伤害长期客户关系或技术债务的方案。"

  - name: "飞轮效应"
    origin: "《从优秀到卓越》- Jim Collins"
    rule: "伟大的成果来自持续朝同一方向的积累推动。每一次努力都在为飞轮增加动力。保持耐心和一致性。"
    violation: "频繁改变方向，缺乏耐心，在飞轮转起来之前就放弃。"

  - name: "延迟满足"
    origin: "Bridgewater - Ray Dalio"
    rule: "愿意为了更大的长期收益而放弃即时的满足感。投资于基础能力建设，即使短期看不到回报。"
    violation: "总是选择能快速出成果的工作，回避需要长期投入才能见效的重要事项。"

  - name: "基业长青"
    origin: "《基业长青》- Jim Collins"
    rule: "构建能够超越任何个人的持久组织。核心理念不变，但运营实践持续进化。保持核心/刺激进步。"
    violation: "过度依赖某个人或某个方法，不建设可复制、可传承的系统和流程。"
